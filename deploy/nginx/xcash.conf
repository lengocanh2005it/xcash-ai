# X-Cash AI — reverse proxy (VPS production)
# Copy to /etc/nginx/sites-available/xcash and symlink to sites-enabled.
# Replace YOUR_DOMAIN and SSL cert paths before enabling HTTPS.

upstream xcash_backend {
    server 127.0.0.1:3000;
}

upstream xcash_frontend {
    server 127.0.0.1:8080;
}

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Certbot challenge (uncomment when using certbot)
    # location /.well-known/acme-challenge/ {
    #     root /var/www/certbot;
    # }

    location /api/ {
        proxy_pass http://xcash_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://xcash_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

